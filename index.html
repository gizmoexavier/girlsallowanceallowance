<!--
  SUPABASE SETUP — run these SQL queries in Supabase SQL Editor before first use:

  alter table transactions enable row level security;https://github.com/gizmoexavier/girlsallowanceallowance/blob/main/index.html
  create policy "Allow anon read" on transactions for select using (true);
  create policy "Allow anon insert" on transactions for insert with check (true);
  create policy "Allow anon delete" on transactions for delete using (true);
  create policy "Allow anon update" on transactions for update using (true);

  alter table settings enable row level security;
  create policy "Allow anon read" on settings for select using (true);
  create policy "Allow anon update" on settings for update using (true);

  insert into settings (girl, weekly_amount) values ('Olivia', 11), ('Charlotte', 4)
  on conflict (girl) do nothing;
-->

<html lang="en">
<head>

<style>

</style>

<body>

<div class="app" id="app">
  <div class="header">
    <div class="header-top">
      <span class="app-title">Bank of Tinsley Allowance Tracker</span>
      <button class="gear-btn" onclick="openSettings()">⚙️</button>
    </div>
    <div class="tabs">
      <button class="tab-btn active" id="tab-olivia" onclick="switchGirl('Olivia')">Olivia</button>

    </div>

      <div class="card-header" id="form-toggle" onclick="toggleForm()">

          <div class="segment" id="type-seg">

          <input type="number" id="tx-amount" min="0.01" step="0.01" placeholder="0.00">

          <label>Note (optional)</label>

<script>
const SUPABASE_URL = "https://wtvyqppmtswdejxenqsb.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind0dnlxcHBtdHN3ZGVqeGVucXNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0OTExOTEsImV4cCI6MjA5MTA2NzE5MX0.xrddQ-3HegZYG90nrYEETvwisndlI6BJ1B6g6GEAEeo";

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const ACCENT = { Olivia: '#FFB7D9', Charlotte: '#C0FFCB' };
const SPEND_CATS = ['Robux/Gaming','Art & Crafts','Food & Treats','Clothes & Accessories','Books','School Store','Other'];
const BONUS_CATS = ['Extra Chores','Yardwork','Gift Card / Cash','Other'];

let activeGirl = 'Olivia';
let txData = { Olivia: [], Charlotte: [] };
let cfg = { Olivia: 11, Charlotte: 4 };
let showHistory = false;
let formOpen = false;
let selType = 'allowance';
let lastTxId = null;
let undoTimer = null;
let editingId = null;
let confirmDeleteId = null;
let partyMode = false;
let partyFrame = null;

async function init() {
  await loadSettings();
  await loadTransactions();
  render();
}

async function loadSettings() {
  const { data } = await sb.from('settings').select('*');
  if (data) data.forEach(r => { cfg[r.girl] = parseFloat(r.weekly_amount); });
  document.getElementById('s-olivia-amt').value = cfg.Olivia;
  document.getElementById('s-charlotte-amt').value = cfg.Charlotte;
}

async function loadTransactions() {
  const { data } = await sb.from('transactions').select('*').order('created_at', { ascending: false });
  if (data) {
    txData.Olivia = data.filter(t => t.girl === 'Olivia');
    txData.Charlotte = data.filter(t => t.girl === 'Charlotte');
  }
}

function calcBalance(girl) {
  return txData[girl].reduce((s, t) => t.type === 'spend' ? s - +t.amount : s + +t.amount, 0);
}

function fmt(n) {
  const sign = n < 0 ? '-' : '';
  return `${sign}$${Math.abs(n).toFixed(2)}`;
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function render() {
  document.documentElement.style.setProperty('--accent', ACCENT[activeGirl]);

  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${activeGirl.toLowerCase()}`).classList.add('active');

  const bal = calcBalance(activeGirl);
  document.getElementById('balance-display').textContent = fmt(bal);
  document.getElementById('balance-name').textContent = `${activeGirl}'s savings`;

  if (selType === 'allowance') {
    document.getElementById('tx-amount').value = cfg[activeGirl];
  }

  renderList();
}

function renderList() {
  const list = document.getElementById('tx-list');
  const txs = txData[activeGirl];
  const show = showHistory ? txs : txs.slice(0, 8);

  document.getElementById('history-btn').textContent = showHistory ? 'Show Recent' : 'Show History';
  document.getElementById('list-label').textContent = showHistory ? 'Full History' : 'Recent';

  if (!show.length) {
    list.innerHTML = '<div class="empty-state">No transactions yet.</div>';
    document.getElementById('history-summary').innerHTML = '';
    return;
  }

  list.innerHTML = show.map(t => buildTxHTML(t)).join('');

  if (showHistory) {
    renderSummary(txs);
  } else {
    document.getElementById('history-summary').innerHTML = '';
  }
}

function buildTxHTML(t) {
  const isSpend = t.type === 'spend';
  const catTag = t.category ? `<span class="tx-cat-tag">${t.category}</span>` : '';
  const noteHtml = t.note ? `<span class="tx-note"> · ${t.note}</span>` : '';

  let extra = '';
  if (editingId === t.id) {
    const catOpts = t.type === 'spend' ? SPEND_CATS : (t.type === 'bonus' ? BONUS_CATS : []);
    const catHtml = catOpts.length ? `
      <div class="form-group">
        <label>Category</label>
        <select id="e-cat-${t.id}">${catOpts.map(c => `<option${c===t.category?' selected':''}>${c}</option>`).join('')}</select>
      </div>` : '';
    extra = `
      <div class="edit-form">
        <div class="edit-form-row">
          <div class="form-group"><label>Amount</label><input type="number" id="e-amt-${t.id}" value="${t.amount}" min="0.01" step="0.01"></div>
          <div class="form-group"><label>Note</label><input type="text" id="e-note-${t.id}" value="${t.note||''}"></div>
        </div>
        ${catHtml}
        <div class="edit-btns">
          <button class="btn btn-primary btn-sm" onclick="saveEdit(${t.id})">Save</button>
          <button class="btn btn-ghost btn-sm" onclick="cancelEdit()">Cancel</button>
        </div>
      </div>`;
  } else if (confirmDeleteId === t.id) {
    extra = `<div class="confirm-delete">
      <button class="btn btn-danger btn-sm" onclick="doDelete(${t.id})">Delete</button>
      <button class="btn btn-ghost btn-sm" onclick="cancelDelete()">Cancel</button>
    </div>`;
  }

  const isEditing = editingId === t.id;
  const isConfirm = confirmDeleteId === t.id;
  const cls = isEditing ? ' editing-mode' : (isConfirm ? ' confirming' : '');
  const actions = (!isEditing && !isConfirm) ? `
    <div class="tx-actions">
      <button class="icon-btn" onclick="startEdit(${t.id})">✏️</button>
      <button class="icon-btn" onclick="startDelete(${t.id})">🗑️</button>
    </div>` : '';

  return `
    <div class="tx-item${cls}" id="tx-${t.id}">
      <div class="tx-main">
        <div class="tx-row1">
          <span class="tx-type ${t.type}">${t.type}</span>
          ${catTag}
          <span class="tx-amount ${isSpend?'spend':'earn'}">${isSpend?'-':'+'}${fmt(+t.amount)}</span>
        </div>
        <div class="tx-row2">
          <span class="tx-date">${fmtDate(t.created_at)}</span>
          ${noteHtml}
        </div>
        ${extra}
      </div>
      ${actions}
    </div>`;
}

function renderSummary(txs) {
  const spendT = {}, earnT = {};
  txs.forEach(t => {
    const a = +t.amount;
    if (t.type === 'spend') {
      const k = t.category || 'Other'; spendT[k] = (spendT[k]||0) + a;
    } else {
      const k = t.category || t.type; earnT[k] = (earnT[k]||0) + a;
    }
  });

  const spendRows = Object.entries(spendT).sort((a,b)=>b[1]-a[1])
    .map(([k,v]) => `<div class="summary-row"><span>${k}</span><span class="amt spend">-${fmt(v)}</span></div>`).join('');
  const earnRows = Object.entries(earnT).sort((a,b)=>b[1]-a[1])
    .map(([k,v]) => `<div class="summary-row"><span>${k}</span><span class="amt earn">+${fmt(v)}</span></div>`).join('');

  document.getElementById('history-summary').innerHTML = `
    ${spendRows ? `<div class="summary-block"><div class="summary-title">Spent by Category</div>${spendRows}</div>` : ''}
    ${earnRows ? `<div class="summary-block"><div class="summary-title">Earned by Type</div>${earnRows}</div>` : ''}`;
}

// Switching
function switchGirl(girl) {
  activeGirl = girl;
  showHistory = false;
  editingId = null;
  confirmDeleteId = null;
  render();
}

// Form
function toggleForm() {
  formOpen = !formOpen;
  document.getElementById('form-body').style.display = formOpen ? 'block' : 'none';
  document.getElementById('form-toggle').classList.toggle('open', formOpen);
}

function selectType(type) {
  selType = type;
  document.querySelectorAll('.seg-btn').forEach(b => b.classList.toggle('active', b.dataset.val === type));
  const catGroup = document.getElementById('cat-group');
  const catSel = document.getElementById('tx-cat');
  const amtField = document.getElementById('tx-amount');

  if (type === 'spend') {
    catGroup.style.display = 'block';
    catSel.innerHTML = SPEND_CATS.map(c=>`<option>${c}</option>`).join('');
    amtField.value = '';
  } else if (type === 'bonus') {
    catGroup.style.display = 'block';
    catSel.innerHTML = BONUS_CATS.map(c=>`<option>${c}</option>`).join('');
    amtField.value = '';
  } else {
    catGroup.style.display = 'none';
    amtField.value = cfg[activeGirl];
  }
  document.getElementById('warn-banner').classList.remove('show');
}

document.getElementById('tx-amount').addEventListener('input', function() {
  if (activeGirl === 'Charlotte' && selType === 'spend') {
    const bal = calcBalance('Charlotte');
    document.getElementById('warn-banner').classList.toggle('show', bal - parseFloat(this.value||0) < 10);
  }
});

async function submitTransaction() {
  const amt = parseFloat(document.getElementById('tx-amount').value);
  if (!amt || amt <= 0) { alert('Enter a valid amount.'); return; }
  const note = document.getElementById('tx-note').value.trim();
  const category = selType !== 'allowance' ? document.getElementById('tx-cat').value : null;

  const { data, error } = await sb.from('transactions').insert({
    girl: activeGirl, type: selType, amount: amt, note: note||null, category
  }).select().single();

  if (error) { alert('Error saving. Check console.'); console.error(error); return; }

  txData[activeGirl].unshift(data);
  lastTxId = data.id;
  document.getElementById('tx-amount').value = selType === 'allowance' ? cfg[activeGirl] : '';
  document.getElementById('tx-note').value = '';
  document.getElementById('warn-banner').classList.remove('show');
  render();
  showUndo('Transaction added');
}

async function addWeeklyBoth() {
  const payloads = ['Olivia','Charlotte'].map(g => ({
    girl: g, type: 'allowance', amount: cfg[g], note: 'Weekly allowance', category: null
  }));
  const { data, error } = await sb.from('transactions').insert(payloads).select();
  if (error) { alert('Error.'); return; }
  data.forEach(t => txData[t.girl].unshift(t));
  lastTxId = null;
  render();
  showMsg('Weekly allowance added for both!');
}

// Undo
function showUndo(msg) {
  clearTimeout(undoTimer);
  const toast = document.getElementById('undo-toast');
  const bar = document.getElementById('undo-bar');
  document.getElementById('undo-text').textContent = msg;
  document.getElementById('undo-btn').style.display = 'block';
  toast.classList.add('show');
  bar.style.transition = 'none';
  bar.style.width = '100%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    bar.style.transition = 'width 10s linear';
    bar.style.width = '0%';
  }));
  undoTimer = setTimeout(() => { toast.classList.remove('show'); lastTxId = null; }, 10000);
}

function showMsg(msg) {
  clearTimeout(undoTimer);
  const toast = document.getElementById('undo-toast');
  document.getElementById('undo-text').textContent = msg;
  document.getElementById('undo-btn').style.display = 'none';
  document.getElementById('undo-bar').style.width = '0';
  toast.classList.add('show');
  undoTimer = setTimeout(() => toast.classList.remove('show'), 3000);
}

async function undoLast() {
  if (!lastTxId) return;
  clearTimeout(undoTimer);
  document.getElementById('undo-toast').classList.remove('show');
  const { error } = await sb.from('transactions').delete().eq('id', lastTxId);
  if (error) { alert('Could not undo.'); return; }
  txData[activeGirl] = txData[activeGirl].filter(t => t.id !== lastTxId);
  lastTxId = null;
  render();
}

function toggleHistory() {
  showHistory = !showHistory;
  renderList();
}

// Edit
function startEdit(id) {
  editingId = id; confirmDeleteId = null; renderList();
}
function cancelEdit() {
  editingId = null; renderList();
}
async function saveEdit(id) {
  const amt = parseFloat(document.getElementById(`e-amt-${id}`).value);
  const note = document.getElementById(`e-note-${id}`).value.trim();
  const catEl = document.getElementById(`e-cat-${id}`);
  const category = catEl ? catEl.value : null;
  if (!amt || amt <= 0) { alert('Enter a valid amount.'); return; }
  const { error } = await sb.from('transactions').update({ amount: amt, note: note||null, category }).eq('id', id);
  if (error) { alert('Error saving.'); return; }
  const t = txData[activeGirl].find(t => t.id === id);
  if (t) { t.amount = amt; t.note = note||null; t.category = category; }
  editingId = null;
  render();
}

// Delete
function startDelete(id) {
  confirmDeleteId = id; editingId = null; renderList();
}
function cancelDelete() {
  confirmDeleteId = null; renderList();
}
async function doDelete(id) {
  const { error } = await sb.from('transactions').delete().eq('id', id);
  if (error) { alert('Error deleting.'); return; }
  txData[activeGirl] = txData[activeGirl].filter(t => t.id !== id);
  if (lastTxId === id) lastTxId = null;
  confirmDeleteId = null;
  render();
}

// Settings
function openSettings() {
  document.getElementById('s-olivia-amt').value = cfg.Olivia;
  document.getElementById('s-charlotte-amt').value = cfg.Charlotte;
  document.getElementById('settings-panel').classList.add('open');
}
function closeSettings() {
  document.getElementById('settings-panel').classList.remove('open');
}

async function saveAllowance(girl) {
  const key = `s-${girl.toLowerCase()}-amt`;
  const amt = parseFloat(document.getElementById(key).value);
  if (isNaN(amt) || amt < 0) { alert('Enter a valid amount.'); return; }
  const { error } = await sb.from('settings').update({ weekly_amount: amt }).eq('girl', girl);
  if (error) { alert('Error saving.'); return; }
  cfg[girl] = amt;
  showMsg(`${girl}'s allowance updated to $${amt.toFixed(2)}`);
  if (activeGirl === girl && selType === 'allowance') {
    document.getElementById('tx-amount').value = amt;
  }
}

async function exportCSV() {
  const { data } = await sb.from('transactions').select('*').order('created_at', { ascending: true });
  if (!data || !data.length) { alert('No data to export.'); return; }
  const rows = [['date','girl','type','amount','category','note'],
    ...data.map(t => [
      new Date(t.created_at).toLocaleDateString('en-US'),
      t.girl, t.type, t.amount, t.category||'', t.note||''
    ])
  ];
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([csv], {type:'text/csv'})),
    download: 'tinsley-allowances.csv'
  });
  a.click();
}

// Party
function toggleParty() {
  partyMode = !partyMode;
  if (partyMode) {
    let frame = 0;
    const props = [
      ['--bg', 10, 50], ['--surface', 15, 50], ['--surface2', 18, 50], ['--surface3', 22, 50],
      ['--text', 85, 80], ['--border', 35, 40]
    ];
    const offsets = props.map((_, i) => i * 25);
    partyFrame = setInterval(() => {
      frame += 3;
      props.forEach(([prop, l, s], i) => {
        const h = (frame + offsets[i]) % 360;
        document.documentElement.style.setProperty(prop, `hsl(${h},${s}%,${l}%)`);
      });
      const h1 = (frame * 2) % 360;
      const h2 = (frame * 2 + 120) % 360;
      document.documentElement.style.setProperty('--olivia', `hsl(${h1},90%,75%)`);
      document.documentElement.style.setProperty('--charlotte', `hsl(${h2},90%,75%)`);
      document.documentElement.style.setProperty('--accent', `hsl(${(frame*2+60)%360},90%,75%)`);
    }, 50);
  } else {
    clearInterval(partyFrame);
    const r = document.documentElement.style;
    [['--bg','#0f0f13'],['--surface','#1a1a22'],['--surface2','#22222e'],['--surface3','#2a2a38'],
     ['--text','#f0f0f5'],['--olivia','#FFB7D9'],['--charlotte','#C0FFCB'],['--border','#33334a']
    ].forEach(([k,v]) => r.setProperty(k,v));
    r.setProperty('--accent', ACCENT[activeGirl]);
  }
}

init();
</script>
