<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyPqR6gKu3PKDwAACU7PnBopmvtwZ71FRug-GZxG4Ogy3YZimD69NMmJw-K8tTswGTu/exec';

async function apiGet(action, params = {}) {
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([key, value]) => url.searchParams.set(key, value));
  const res = await fetch(url.toString());
  if (!res.ok) throw new Error(`API ${action} failed: ${res.status}`);
  const data = await res.json();
  if (data && data.error) throw new Error(data.error);
  return data;
}

const GIRL = 'Charlotte';
const DEFAULT_COLOR = '#C0FFCB';

let txData = [];
let accentColor = '#C0FFCB';
let showHistory = false;
let historyFilter = 'all';
let partyMode = false;
let partyFrame = null;
let toastTimer = null;

// ── NOTIFICATIONS ──
const NOTIF_KEY = `bot_seen_notifs_${GIRL}`;
const NOTIF_EXPIRY_DAYS = 14;

function getSeenNotifs() {
  try { return JSON.parse(localStorage.getItem(NOTIF_KEY) || '{}'); }
  catch { return {}; }
}

function markNotifSeen(id) {
  const seen = getSeenNotifs();
  seen[id] = Date.now();
  const cutoff = Date.now() - NOTIF_EXPIRY_DAYS * 24 * 60 * 60 * 1000;
  for (const k in seen) { if (seen[k] < cutoff) delete seen[k]; }
  localStorage.setItem(NOTIF_KEY, JSON.stringify(seen));
}

function buildNotifications() {
  const stack = document.getElementById('notif-stack');
  stack.innerHTML = '';

  const seen = getSeenNotifs();
  const cutoff = new Date(Date.now() - NOTIF_EXPIRY_DAYS * 24 * 60 * 60 * 1000);

  const pending = txData.filter(t => {
    if (t.type !== 'allowance' && t.type !== 'bonus') return false;
    if (seen[t.id]) return false;
    if (new Date(t.created_at) < cutoff) return false;
    return true;
  });

  if (!pending.length) return;

  const ordered = [...pending].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

  ordered.forEach((t, i) => {
    const isBonus = t.type === 'bonus';
    const emoji = isBonus ? '🤑' : '💪';
    const title = isBonus ? 'Bonus earned!' : 'Weekly allowance added!';
    const sub = new Date(t.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const noteText = t.note ? ` · ${t.note}` : '';

    const card = document.createElement('div');
    card.className = `notif-card ${t.type}`;
    card.style.animationDelay = `${i * 80}ms`;
    card.innerHTML = `
      <div class="notif-emoji">${emoji}</div>
      <div class="notif-body">
        <div class="notif-title">${title}</div>
        <div class="notif-sub">${sub}${noteText}</div>
      </div>
      <div class="notif-amount">+${fmt(safeAmt(t))}</div>
      <button class="notif-dismiss" onclick="dismissNotif('${t.id}', this.closest('.notif-card'))">✕</button>
    `;
    stack.appendChild(card);
  });
}

function dismissNotif(id, cardEl) {
  markNotifSeen(id);
  cardEl.style.transition = 'opacity 0.25s, transform 0.25s';
  cardEl.style.opacity = '0';
  cardEl.style.transform = 'translateY(10px) scale(0.95)';
  setTimeout(() => cardEl.remove(), 260);
}
let chartInstance = null;
let chartRange = 'month';

// ── INIT ──
function hideSplash() {
  const splash = document.getElementById('splash-screen');
  if (!splash) return;
  splash.classList.add('fade-out');
  setTimeout(() => splash.remove(), 420);
}

async function init() {
  try {
    await loadSettings();
    await loadTransactions();
    render();
    buildNotifications();
  } catch (err) {
    console.error(err);
    showToast('Something went wrong loading data');
  } finally {
    hideSplash();
  }
}

async function loadSettings() {
  try {
    const saved = localStorage.getItem(`tinsleyColor_${GIRL}`);
    if (saved) { accentColor = saved; applyColor(saved); document.getElementById('color-picker').value = saved; }
  } catch(e) { /* ignore */ }
}

async function loadTransactions() {
  const data = await apiGet('getTransactions', { girl: GIRL });
  if (data) txData = [...data].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
}

function fmt(n) {
  const sign = n < 0 ? '-' : '';
  return `${sign}$${Math.abs(n).toFixed(2)}`;
}

function safeAmt(t) {
  return parseFloat(t.amount) || 0;
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// ── RENDER ──
function render() {
  const now = new Date();
  const month = now.getMonth(), year = now.getFullYear();
  let balance = 0, earned = 0, spent = 0, bonus = 0;

  txData.forEach(t => {
    const a = safeAmt(t);
    balance += t.type === 'spend' ? -a : a;
    const d = new Date(t.created_at);
    if (d.getMonth() === month && d.getFullYear() === year) {
      if (t.type === 'spend') spent += a;
      else if (t.type === 'bonus') bonus += a;
      else earned += a;
    }
  });

  document.getElementById('balance-display').textContent = fmt(balance);
  document.getElementById('stats-month').textContent = now.toLocaleString('en-US', { month: 'long' });
  document.getElementById('stat-earned').textContent = fmt(earned);
  document.getElementById('stat-spent').textContent = fmt(spent);
  document.getElementById('stat-bonus').textContent = fmt(bonus);

  renderTransactions();
  renderChart();
}

function renderTransactions() {
  const list = document.getElementById('tx-list');
  const txs = showHistory
    ? (historyFilter === 'all' ? txData : txData.filter(t => t.type === historyFilter))
    : txData.slice(0, 8);

  document.getElementById('list-label').textContent = showHistory ? 'Full History' : 'Recent Transactions';
  document.getElementById('history-btn').textContent = showHistory ? 'Show Recent' : 'Full History';
  document.getElementById('filter-bar').style.display = showHistory ? 'flex' : 'none';

  if (!txs.length) { list.innerHTML = '<div class="empty-state">No transactions yet.</div>'; return; }

  list.innerHTML = txs.map(t => {
    const isSpend = t.type === 'spend';
    const categoryIcons = {
      'Robux/Gaming': 'sports_esports',
      'Art & Crafts': 'brush',
      'Food & Treats': 'fastfood',
      'Clothes & Accessories': 'shopping_bag',
      'Books': 'menu_book',
      'School Store': 'school',
      'Extra Chores': 'cleaning_services',
      'Yardwork': 'yard',
      'Gift Card / Cash': 'payments',
      'Other': 'category'
    };
    const iconName = t.type === 'bonus'
      ? 'star'
      : isSpend
        ? (categoryIcons[t.category] || 'shopping_bag')
        : 'payments';
    const catTag = t.category ? `<span class="tx-cat-tag">${t.category}</span>` : '';
    const noteHtml = t.note ? `<span class="tx-note"> · ${t.note}</span>` : '';
    return `<div class="tx-item">
      <span class="tx-icon ${t.type}"><span class="material-symbols-outlined">${iconName}</span></span>
      <div class="tx-row1">
        <span class="tx-type ${t.type}">${t.type}</span>
        ${catTag}
        <span class="tx-amount ${isSpend ? 'spend' : 'earn'}">${isSpend ? '-' : '+'}${fmt(safeAmt(t))}</span>
      </div>
      <div class="tx-row2">
        <span class="tx-date">${fmtDate(t.created_at)}</span>
        ${noteHtml}
      </div>
    </div>`;
  }).join('');
}

function toggleHistory() {
  showHistory = !showHistory;
  if (!showHistory) {
    historyFilter = 'all';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === 'all'));
  }
  renderTransactions();
}

function setFilter(f) {
  historyFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  renderTransactions();
}

// ── SETTINGS ──
function openSettings() {
  document.getElementById('settings-panel').classList.add('open');
  document.getElementById('settings-overlay').classList.add('show');
}
function closeSettings() {
  document.getElementById('settings-panel').classList.remove('open');
  document.getElementById('settings-overlay').classList.remove('show');
}

function applyColor(color) {
  accentColor = color;
  document.documentElement.style.setProperty('--accent', color);
  document.getElementById('color-swatch').style.background = color;
  document.getElementById('color-label').style.color = color;
  document.getElementById('color-picker').value = color;
}

function swatchPreview(color) {
  document.getElementById('color-swatch').style.background = color;
}

async function saveColor() {
  const color = document.getElementById('color-picker').value;
  localStorage.setItem(`tinsleyColor_${GIRL}`, color);
  applyColor(color);
  showToast('Color saved! 🎨');
}

async function resetColor() {
  localStorage.removeItem(`tinsleyColor_${GIRL}`);
  applyColor(DEFAULT_COLOR);
  document.getElementById('color-picker').value = DEFAULT_COLOR;
  showToast('Color reset!');
}

// ── PARTY ──
function toggleParty() {
  partyMode = !partyMode;
  const confetti = document.getElementById('confetti');
  const disco = document.getElementById('disco-ball');
  const cats = document.getElementById('party-cats');

  if (partyMode) {
    confetti.classList.add('show');
    disco.style.display = 'block';
    disco.classList.remove('sway');
    disco.classList.add('drop');
    disco.addEventListener('animationend', function handler(e) {
      if (e.animationName === 'ballDrop') {
        disco.classList.remove('drop');
        disco.style.top = '-10px';
        disco.classList.add('sway');
        disco.removeEventListener('animationend', handler);
      }
    });
    cats.style.display = 'flex';
    requestAnimationFrame(() => cats.classList.add('show'));
    if (partyFrame) cancelAnimationFrame(partyFrame);
    let frame = 0;
    const props = [
      ['--bg',10,50],['--surface',15,50],['--surface2',18,50],
      ['--surface3',22,50],['--text',85,80],['--border',35,40]
    ];
    const offsets = props.map((_,i) => i * 25);
    let lastTime = null;
    function partyLoop(ts) {
      if (!partyMode) return;
      if (!lastTime || ts - lastTime >= 50) {
        lastTime = ts;
        frame += 3;
        props.forEach(([prop,l,s],i) => {
          const h = (frame + offsets[i]) % 360;
          document.documentElement.style.setProperty(prop, `hsl(${h},${s}%,${l}%)`);
        });
        document.documentElement.style.setProperty('--accent', `hsl(${(frame*2)%360},90%,75%)`);
      }
      partyFrame = requestAnimationFrame(partyLoop);
    }
    partyFrame = requestAnimationFrame(partyLoop);
  } else {
    confetti.classList.remove('show');
    disco.classList.remove('drop','sway');
    disco.style.display = 'none'; disco.style.top = '-180px';
    cats.classList.remove('show');
    setTimeout(() => { cats.style.display = 'none'; }, 1000);
    cancelAnimationFrame(partyFrame);
    const r = document.documentElement.style;
    [['--bg','#0b1326'],['--surface','#131b2e'],['--surface2','#171f33'],
     ['--surface3','#222a3d'],['--text','#dae2fd'],['--border','#2d3449']
    ].forEach(([k,v]) => r.setProperty(k,v));
    r.setProperty('--accent', accentColor);
  }
}

// ── CSV ──
async function exportCSV() {
  const data = await apiGet('getTransactions', { girl: GIRL });
  const sorted = [...(data || [])].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  if (!sorted.length) { alert('No data to export.'); return; }
  const rows = [['date','type','amount','category','note'],
    ...sorted.map(t => [
      new Date(t.created_at).toLocaleDateString('en-US'),
      t.type, t.amount, t.category||'', t.note||''
    ])
  ];
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([csv], {type:'text/csv'})),
    download: `tinsley-${GIRL.toLowerCase()}.csv`
  }).click();
  showToast('CSV downloaded! 📊');
}

// ── TOAST ──
function showToast(msg) {
  clearTimeout(toastTimer);
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── CHART ──
function setChartRange(range) {
  chartRange = range;
  document.querySelectorAll('.chart-tab').forEach(b => b.classList.toggle('active', b.dataset.range === range));
  renderChart();
}

function renderChart() {
  const now = new Date();
  let labels = [], balances = [];

  const sorted = [...txData]
    .sort((a,b) => new Date(a.created_at) - new Date(b.created_at))
    .map(t => ({ ...t, _amt: safeAmt(t), _ts: new Date(t.created_at).getTime() }));

  function runningBalances(cutoffs) {
    let bal = 0, idx = 0;
    return cutoffs.map(cutoffMs => {
      while (idx < sorted.length && sorted[idx]._ts <= cutoffMs) {
        const t = sorted[idx++];
        bal += t.type === 'spend' ? -t._amt : t._amt;
      }
      return bal;
    });
  }

  if (chartRange === 'week') {
    const cutoffs = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(now); d.setDate(d.getDate()-i); d.setHours(23,59,59,999);
      labels.push(d.toLocaleDateString('en-US', {weekday:'short'}));
      cutoffs.push(d.getTime());
    }
    balances = runningBalances(cutoffs);

  } else if (chartRange === 'month') {
    const days = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
    const cutoffs = [];
    for (let i = 1; i <= days; i++) {
      const d = new Date(now.getFullYear(), now.getMonth(), i, 23,59,59,999);
      if (d > now) break;
      labels.push(i.toString());
      cutoffs.push(d.getTime());
    }
    balances = runningBalances(cutoffs);

  } else if (chartRange === 'year') {
    const cutoffs = [];
    for (let i = 11; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth()-i+1, 0, 23,59,59,999);
      labels.push(d.toLocaleDateString('en-US', {month:'short'}));
      cutoffs.push(d.getTime());
    }
    balances = runningBalances(cutoffs);

  } else {
    if (sorted.length) {
      const first = new Date(sorted[0]._ts);
      const cursor = new Date(first.getFullYear(), first.getMonth(), 1);
      const cutoffs = [];
      while (cursor <= now) {
        const end = new Date(cursor.getFullYear(), cursor.getMonth()+1, 0, 23,59,59,999);
        labels.push(cursor.toLocaleDateString('en-US', {month:'short',year:'2-digit'}));
        cutoffs.push(end.getTime());
        cursor.setMonth(cursor.getMonth()+1);
      }
      balances = runningBalances(cutoffs);
    }
  }

  const rootStyles = getComputedStyle(document.documentElement);
  const primary = rootStyles.getPropertyValue('--color-primary').trim() || '#ffb3ae';
  const gridColor = 'rgba(45, 52, 73, 0.8)';
  const tickColor = '#b9c8de';
  const surfaceColor = rootStyles.getPropertyValue('--color-surface-container-lowest').trim() || '#060e20';
  const textColor = rootStyles.getPropertyValue('--color-on-surface').trim() || '#dae2fd';
  const ctx = document.getElementById('balance-chart').getContext('2d');
  const chartGradient = ctx.createLinearGradient(0, 0, 0, ctx.canvas.height || 220);
  chartGradient.addColorStop(0, 'rgba(255, 179, 174, 0.15)');
  chartGradient.addColorStop(1, 'rgba(255, 179, 174, 0)');
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: balances,
        borderColor: primary,
        backgroundColor: chartGradient,
        borderWidth: 2.5,
        pointRadius: 4,
        pointHoverRadius: 5,
        pointBackgroundColor: primary,
        fill: true, tension: 0.4
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: ctx => `$${ctx.parsed.y.toFixed(2)}` },
          backgroundColor: surfaceColor, borderColor: gridColor, borderWidth: 1,
          titleColor: textColor, bodyColor: primary, padding: 10, cornerRadius: 8
        }
      },
      scales: {
        x: { grid: { color: gridColor, drawBorder: false }, ticks: { color: tickColor, font: { family: 'Hanken Grotesk', size: 11, weight: '500' }, maxTicksLimit: 8 } },
        y: { grid: { color: gridColor, drawBorder: false }, ticks: { color: tickColor, font: { family: 'Hanken Grotesk', size: 11, weight: '500' }, callback: v => `$${v}` } }
      }
    }
  });
}

// ── PULL TO REFRESH ──
(function() {
  const PTR_THRESHOLD = 80;
  let startY = 0, currentY = 0, pulling = false, refreshing = false;
  const indicator = document.getElementById('ptr-indicator');

  document.addEventListener('touchstart', e => {
    if (window.scrollY > 0 || refreshing) return;
    startY = e.touches[0].clientY;
    pulling = true;
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!pulling || refreshing) return;
    currentY = e.touches[0].clientY;
    const delta = Math.min(currentY - startY, PTR_THRESHOLD * 1.5);
    if (delta <= 0) return;

    indicator.classList.add('ptr-visible');
    if (delta >= PTR_THRESHOLD) {
      indicator.classList.add('ptr-ready');
      indicator.querySelector('span').textContent = '↻';
    } else {
      indicator.classList.remove('ptr-ready');
      indicator.querySelector('span').textContent = '↓';
      indicator.style.transform = `translateX(-50%) translateY(${-60 + delta * 0.75}px)`;
    }
  }, { passive: true });

  document.addEventListener('touchend', async () => {
    if (!pulling || refreshing) return;
    pulling = false;
    const delta = currentY - startY;

    if (delta >= PTR_THRESHOLD) {
      refreshing = true;
      const grid = document.querySelector('.main-grid');
      indicator.classList.add('ptr-ready', 'ptr-spinning');
      indicator.style.transform = 'translateX(-50%) translateY(16px)';
      indicator.querySelector('span').textContent = '↻';
      if (grid) { grid.style.transition = 'opacity 0.2s'; grid.style.opacity = '0.4'; }
      await loadTransactions();
      render();
      buildNotifications();
      if (grid) { grid.style.opacity = '1'; }
      refreshing = false;
    }

    indicator.classList.remove('ptr-visible', 'ptr-ready', 'ptr-spinning');
    indicator.style.transform = '';
    indicator.querySelector('span').textContent = '↓';
    currentY = 0; startY = 0;
  });
})();

init();
</script>
</body>
</html>
