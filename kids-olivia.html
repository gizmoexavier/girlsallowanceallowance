<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bank of Tinsley">
<meta name="theme-color" content="#0f0f13">
<title>Bank of Tinsley — Olivia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Arvo:wght@700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="https://gizmoexavier.github.io/girlsallowanceallowance/manifest-olivia.json">
<link rel="apple-touch-icon" href="https://gizmoexavier.github.io/girlsallowanceallowance/BankofTinsleyAppIcon.png">
<style>
/* ── CHART CARD ── */
.chart-card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 18px 20px;
}

.chart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.chart-title {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-muted);
  font-weight: 700;
}

.chart-tabs {
  display: flex;
  gap: 4px;
}

.chart-tab {
  padding: 4px 10px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  background: var(--surface2);
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
}

.chart-tab.active {
  background: color-mix(in srgb, var(--accent) 20%, var(--surface2));
  color: var(--accent);
  border-color: color-mix(in srgb, var(--accent) 50%, transparent);
}

.chart-wrap {
  position: relative;
  height: 160px;
}
  :root {
    --accent: #FFB7D9;
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --surface3: #2a2a38;
    --text: #f0f0f5;
    --text-muted: #8888a0;
    --border: #33334a;
    --danger: #ff6b6b;
    --radius: 16px;
    --radius-sm: 10px;
    --transition: 0.2s ease;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Open Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 17px;
    line-height: 1.5;
    overscroll-behavior: none;
  }

  /* ── PARTY OVERLAYS ── */
  .confetti-overlay {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 500;
    display: none;
    background: url('https://github.com/gizmoexavier/girlsallowanceallowance/blob/main/confettgif512x512.gif?raw=true') center/cover;
    opacity: 0.75;
  }
  .confetti-overlay.show { display: block; }

  .disco-ball {
    position: fixed;
    top: -180px; left: 50%;
    transform: translateX(-50%);
    width: 140px; z-index: 510;
    pointer-events: none;
    display: none;
    transform-origin: top center;
  }
  .disco-ball.drop {
    display: block;
    animation: ballDrop 1s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  .disco-ball.sway {
    animation: ballSway 3s ease-in-out infinite;
  }
  @keyframes ballDrop {
    from { top: -180px; }
    to { top: -10px; }
  }
  @keyframes ballSway {
    0%, 100% { transform: translateX(-50%) rotate(-8deg); }
    50% { transform: translateX(-50%) rotate(8deg); }
  }

  .party-cats {
    position: fixed; bottom: -160px;
    left: 0; right: 0;
    display: none;
    justify-content: space-between;
    align-items: flex-end;
    padding: 0 40px;
    z-index: 510; pointer-events: none;
  }
  .party-cats.show {
    display: flex;
    animation: catsUp 1s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  @keyframes catsUp {
    from { bottom: -160px; }
    to { bottom: 0px; }
  }
  .party-cats img { width: 150px; height: auto; }
  .party-cats img:last-child { transform: scaleX(-1); }

  /* ── LAYOUT ── */
  .app { max-width: 1100px; margin: 0 auto; padding: 0 0 60px; }

  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }

  .logo-wrap img { height: 52px; width: auto; display: block; }

  .header-right { display: flex; align-items: center; gap: 14px; }

  .girl-badge {
    font-family: 'Arvo', serif; font-size: 22px;
    color: var(--accent);
    padding: 6px 18px; border-radius: 30px;
    background: color-mix(in srgb, var(--accent) 12%, transparent);
    border: 1.5px solid color-mix(in srgb, var(--accent) 30%, transparent);
  }

  .gear-btn {
    width: 50px; height: 50px;
    background: var(--surface2); border: none; border-radius: 50%;
    color: var(--text-muted); font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  .main-grid {
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 28px; padding: 28px;
    align-items: start;
  }

  @media (max-width: 700px) {
    .main-grid { grid-template-columns: 1fr; padding: 16px; }
    .left-col { position: static; }
  }

  .left-col {
    display: flex; flex-direction: column; gap: 18px;
    position: sticky; top: 84px;
  }

  /* ── BALANCE CARD ── */
  .balance-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 28px 24px;
    border: 1px solid var(--border);
    position: relative; overflow: hidden;
  }
  .balance-card::before {
    content: ''; position: absolute;
    top: -50px; right: -50px;
    width: 170px; height: 170px; border-radius: 50%;
    background: color-mix(in srgb, var(--accent) 15%, transparent);
    pointer-events: none;
  }
  .balance-card::after {
    content: ''; position: absolute;
    bottom: -30px; left: -30px;
    width: 100px; height: 100px; border-radius: 50%;
    background: color-mix(in srgb, var(--accent) 8%, transparent);
    pointer-events: none;
  }

  .balance-girl {
    font-family: 'Arvo', serif; font-size: 32px;
    color: var(--accent); margin-bottom: 4px;
  }

  .balance-label {
    font-size: 12px; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 6px;
  }

  .balance-amount {
    font-family: 'Arvo', serif; font-size: 60px;
    line-height: 1; color: var(--accent); margin-bottom: 8px;
  }

  .auto-note {
    font-size: 12px; color: var(--text-muted); letter-spacing: 0.2px;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 18px 20px;
  }

  .stats-month {
    font-size: 12px; text-transform: uppercase;
    letter-spacing: 1.2px; color: var(--text-muted);
    font-weight: 700; margin-bottom: 14px;
  }

  .stats-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }

  .stat-item {
    background: var(--surface2); border-radius: var(--radius-sm);
    padding: 12px 8px; text-align: center;
    border: 1px solid var(--border);
  }

  .stat-label {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--text-muted);
    font-weight: 700; margin-bottom: 6px;
  }

  .stat-value {
    font-family: 'Arvo', serif; font-size: 19px; font-weight: 700;
  }

  .stat-value.earn { color: var(--accent); }
  .stat-value.spend { color: var(--danger); }
  .stat-value.bonus { color: var(--accent); opacity: 0.75; }

  /* ── RIGHT COL ── */
  .right-col { display: flex; flex-direction: column; gap: 16px; }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
  }

  .section-title {
    font-size: 13px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text-muted); font-weight: 700;
  }

  .toggle-history {
    font-size: 14px; font-weight: 600; color: var(--accent);
    background: none; border: none; cursor: pointer; padding: 4px 8px;
  }

  .history-filter {
    display: flex; gap: 8px; flex-wrap: wrap;
  }

  .filter-btn {
    padding: 7px 16px; border: 1.5px solid var(--border);
    border-radius: 20px; background: var(--surface2);
    color: var(--text-muted); font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all var(--transition);
  }
  .filter-btn.active {
    background: color-mix(in srgb, var(--accent) 20%, var(--surface2));
    color: var(--accent);
    border-color: color-mix(in srgb, var(--accent) 50%, transparent);
  }

  .tx-list { display: flex; flex-direction: column; gap: 10px; }

  .tx-item {
    background: var(--surface); border-radius: var(--radius-sm);
    padding: 14px 18px; border: 1px solid var(--border);
  }

  .tx-row1 {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 3px; flex-wrap: wrap;
  }

  .tx-type { font-size: 15px; font-weight: 700; text-transform: capitalize; }
  .tx-type.spend { color: var(--danger); }
  .tx-type.allowance, .tx-type.bonus { color: var(--accent); }

  .tx-amount {
    font-family: 'Arvo', serif; font-size: 18px; font-weight: 700;
    margin-left: auto; flex-shrink: 0;
  }
  .tx-amount.spend { color: var(--danger); }
  .tx-amount.earn { color: var(--accent); }

  .tx-cat-tag {
    font-size: 11px; font-weight: 600; padding: 2px 8px;
    border-radius: 20px;
    background: color-mix(in srgb, var(--accent) 18%, transparent);
    color: var(--accent); text-transform: capitalize;
    border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
  }

  .tx-row2 { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
  .tx-date { font-size: 13px; color: var(--text-muted); }
  .tx-note { font-size: 13px; color: var(--text-muted); font-style: italic; }

  /* ── SETTINGS PANEL (slides from right) ── */
  .settings-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 299; display: none;
    backdrop-filter: blur(2px);
  }
  .settings-overlay.show { display: block; }

  .settings-panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: min(360px, 100vw);
    background: var(--bg); z-index: 300;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(.32,.72,0,1);
    overflow-y: auto;
    border-left: 1px solid var(--border);
    box-shadow: -8px 0 32px rgba(0,0,0,0.4);
  }
  .settings-panel.open { transform: translateX(0); }

  .panel-header {
    position: sticky; top: 0; background: var(--bg);
    padding: 18px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-title { font-family: 'Arvo', serif; font-size: 22px; }
  .close-btn {
    width: 44px; height: 44px; background: var(--surface2);
    border: none; border-radius: 50%; color: var(--text);
    font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .panel-content { padding: 18px; }

  .settings-group {
    background: var(--surface); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 18px; margin-bottom: 16px;
  }
  .settings-group-title {
    font-size: 12px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text-muted);
    font-weight: 700; margin-bottom: 14px;
  }

  .color-row { display: flex; align-items: center; gap: 12px; }
  .color-row-label { flex: 1; font-size: 16px; font-weight: 600; color: var(--accent); }

  .color-picker-wrap {
    position: relative; width: 48px; height: 48px; flex-shrink: 0;
  }
  .color-swatch {
    width: 48px; height: 48px; border-radius: 50%;
    border: 2px solid var(--border); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; background: var(--accent);
    transition: transform var(--transition);
  }
  .color-swatch:active { transform: scale(0.9); }
  .color-picker-wrap input[type="color"] {
    position: absolute; inset: 0; opacity: 0;
    width: 100%; height: 100%; cursor: pointer;
    border: none; padding: 0; min-height: unset; border-radius: 50%;
  }

  .color-btns { display: flex; gap: 8px; margin-top: 12px; }

  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 14px; border: none;
    border-radius: var(--radius); font-family: 'Open Sans', sans-serif;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: opacity var(--transition), transform var(--transition);
    min-height: 52px;
  }
  .btn:active { opacity: 0.8; transform: scale(0.98); }
  .btn-ghost { background: var(--surface2); color: var(--text-muted); border: 1.5px solid var(--border); }
  .btn-accent {
    background: color-mix(in srgb, var(--accent) 20%, var(--surface2));
    color: var(--accent);
    border: 1.5px solid color-mix(in srgb, var(--accent) 40%, transparent);
  }
  .party-btn {
    background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #c77dff);
    color: #fff; border: none; font-weight: 700; font-size: 18px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5); min-height: 60px;
  }

  .empty-state { text-align: center; padding: 40px 16px; color: var(--text-muted); font-size: 15px; }
  .loading { text-align: center; padding: 32px; color: var(--text-muted); font-size: 15px; }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface3); border: 1.5px solid var(--border);
    border-radius: 30px; padding: 12px 24px;
    z-index: 600; transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
    opacity: 0; white-space: nowrap; font-size: 14px; font-weight: 600;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── NOTIFICATION STACK ── */
  .notif-stack {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 700;
    display: flex;
    flex-direction: column-reverse;
    align-items: center;
    gap: 10px;
    width: min(420px, calc(100vw - 32px));
    pointer-events: none;
  }

  .notif-card {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    pointer-events: all;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    animation: notifSlideUp 0.4s cubic-bezier(.34,1.56,.64,1) both;
  }

  .notif-card.allowance {
    border-color: color-mix(in srgb, var(--accent) 50%, transparent);
    background: color-mix(in srgb, var(--accent) 8%, var(--surface));
  }

  .notif-card.bonus {
    border-color: color-mix(in srgb, #ffd93d 50%, transparent);
    background: color-mix(in srgb, #ffd93d 8%, var(--surface));
  }

  @keyframes notifSlideUp {
    from { opacity: 0; transform: translateY(30px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0)   scale(1); }
  }

  .notif-emoji {
    font-size: 32px;
    line-height: 1;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .notif-body { flex: 1; min-width: 0; }

  .notif-title {
    font-family: 'Arvo', serif;
    font-size: 16px;
    color: var(--text);
    margin-bottom: 3px;
  }

  .notif-sub {
    font-size: 13px;
    color: var(--text-muted);
  }

  .notif-amount {
    font-family: 'Arvo', serif;
    font-size: 22px;
    color: var(--accent);
    flex-shrink: 0;
    align-self: center;
  }

  .notif-card.bonus .notif-amount {
    color: #ffd93d;
  }

  .notif-dismiss {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    padding: 0 0 0 8px;
    flex-shrink: 0;
    align-self: flex-start;
    line-height: 1;
    margin-top: 1px;
  }
  .notif-dismiss:hover { color: var(--text); }

  /* ── PULL TO REFRESH ── */
  .ptr-indicator {
    position: fixed;
    top: 0; left: 50%;
    transform: translateX(-50%) translateY(-60px);
    width: 44px; height: 44px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    z-index: 800;
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), opacity 0.2s;
    opacity: 0;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .ptr-indicator.ptr-visible {
    opacity: 1;
  }
  .ptr-indicator.ptr-ready {
    transform: translateX(-50%) translateY(16px);
  }
  .ptr-indicator.ptr-spinning span {
    display: inline-block;
    animation: ptrSpin 0.6s linear infinite;
  }
  @keyframes ptrSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  #splash-screen {
    position: fixed; inset: 0; z-index: 9999;
    background: #0f0f13;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 32px;
    transition: opacity 0.4s ease;
  }
  #splash-screen.fade-out { opacity: 0; pointer-events: none; }
  #splash-screen img { width: 260px; max-width: 80vw; }
  .splash-bar-track {
    width: 260px; max-width: 80vw; height: 4px;
    background: #22222e; border-radius: 2px; overflow: hidden;
  }
  .splash-bar {
    height: 100%; width: 40%; border-radius: 2px;
    background: #FFB7D9;
    animation: splashSlide 1.2s ease-in-out infinite;
  }
  @keyframes splashSlide {
    0%   { transform: translateX(-100%); }
    50%  { transform: translateX(150%); }
    100% { transform: translateX(350%); }
  }
</style>
</head>
<body>

<div id="splash-screen">
  <img src="https://github.com/gizmoexavier/girlsallowanceallowance/blob/main/Bankoftinsleylogo.png?raw=true" alt="Bank of Tinsley">
  <div class="splash-bar-track">
    <div class="splash-bar"></div>
  </div>
</div>

<!-- PARTY OVERLAYS — all hidden on load -->
<div class="confetti-overlay" id="confetti"></div>
<div class="disco-ball" id="disco-ball" style="display:none">
  <img src="https://github.com/gizmoexavier/girlsallowanceallowance/blob/main/discoballgif.gif?raw=true" alt="disco ball" style="width:140px;height:auto;">
</div>
<div class="party-cats" id="party-cats" style="display:none">
  <img src="https://github.com/gizmoexavier/girlsallowanceallowance/blob/main/pngtree-party-cat-cartoon-png-image_6129662.png?raw=true" alt="party cat">
  <img src="https://github.com/gizmoexavier/girlsallowanceallowance/blob/main/pngtree-party-cat-cartoon-png-image_6129662.png?raw=true" alt="party cat">
</div>

<div class="app">
  <div class="header">
    <div class="logo-wrap">
      <img src="https://github.com/gizmoexavier/girlsallowanceallowance/blob/main/Bankoftinsleylogo.png?raw=true" alt="Bank of Tinsley">
    </div>
    <div class="header-right">
      <span class="girl-badge">Olivia</span>
      <button class="gear-btn" onclick="openSettings()">⚙️</button>
    </div>
  </div>

  <div class="main-grid">
    <!-- LEFT -->
    <div class="left-col">
      <div class="balance-card">
        <div class="balance-girl">Olivia</div>
        <div class="balance-label">Current Balance</div>
        <div class="balance-amount" id="balance-display">$0.00</div>
        <div class="auto-note">🕛 Allowances added every Sunday at midnight</div>
      </div>

      <div class="stats-bar">
        <div class="stats-month" id="stats-month">This Month</div>
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-label">Earned</div>
            <div class="stat-value earn" id="stat-earned">$0.00</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Spent</div>
            <div class="stat-value spend" id="stat-spent">$0.00</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Bonuses</div>
            <div class="stat-value bonus" id="stat-bonus">$0.00</div>
          </div>
        </div>
      </div>
    </div>
<div class="chart-card">
  <div class="chart-header">
    <span class="chart-title">Balance Over Time</span>
    <div class="chart-tabs">
      <button class="chart-tab active" data-range="week" onclick="setChartRange('week')">Week</button>
      <button class="chart-tab" data-range="month" onclick="setChartRange('month')">Month</button>
      <button class="chart-tab" data-range="year" onclick="setChartRange('year')">Year</button>
      <button class="chart-tab" data-range="all" onclick="setChartRange('all')">All</button>
    </div>
  </div>
  <div class="chart-wrap">
    <canvas id="balance-chart"></canvas>
  </div>
</div>
    <!-- RIGHT -->
    <div class="right-col">
      <div class="section-header">
        <span class="section-title" id="list-label">Recent Transactions</span>
        <button class="toggle-history" id="history-btn" onclick="toggleHistory()">Full History</button>
      </div>
      <div class="history-filter" id="filter-bar" style="display:none">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
        <button class="filter-btn" data-filter="allowance" onclick="setFilter('allowance')">Allowance</button>
        <button class="filter-btn" data-filter="bonus" onclick="setFilter('bonus')">Bonus</button>
        <button class="filter-btn" data-filter="spend" onclick="setFilter('spend')">Spend</button>
      </div>
      <div class="tx-list" id="tx-list"><div class="loading">Loading...</div></div>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div class="settings-overlay" id="settings-overlay" onclick="closeSettings()"></div>
<div class="settings-panel" id="settings-panel">
  <div class="panel-header">
    <span class="panel-title">Settings</span>
    <button class="close-btn" onclick="closeSettings()">✕</button>
  </div>
  <div class="panel-content">
    <div class="settings-group">
      <div class="settings-group-title">My Color</div>
      <div class="color-row">
        <span class="color-row-label" id="color-label">Olivia</span>
        <div class="color-picker-wrap">
          <div class="color-swatch" id="color-swatch">🪄</div>
          <input type="color" id="color-picker" value="#FFB7D9" oninput="swatchPreview(this.value)">
        </div>
      </div>
      <div class="color-btns">
        <button class="btn btn-accent" onclick="saveColor()">Save Color</button>
        <button class="btn btn-ghost" onclick="resetColor()">Reset</button>
      </div>
    </div>
    <div class="settings-group">
      <div class="settings-group-title">Party</div>
      <button class="btn party-btn" onclick="toggleParty()">🌈 PARTY TIME</button>
    </div>
    <div class="settings-group">
      <div class="settings-group-title">Data</div>
      <button class="btn btn-ghost" onclick="exportCSV()">📤 Export to CSV</button>
    </div>
  </div>
</div>

<div class="ptr-indicator" id="ptr-indicator"><span>↓</span></div>

<div class="notif-stack" id="notif-stack"></div>

<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyPqR6gKu3PKDwAACU7PnBopmvtwZ71FRug-GZxG4Ogy3YZimD69NMmJw-K8tTswGTu/exec';

async function apiGet(action, params = {}) {
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([key, value]) => url.searchParams.set(key, value));
  const res = await fetch(url.toString());
  if (!res.ok) throw new Error(`API ${action} failed: ${res.status}`);
  const data = await res.json();
  if (data && data.error) throw new Error(data.error);
  return data;
}

const GIRL = 'Olivia';
const DEFAULT_COLOR = '#FFB7D9';

let txData = [];
let accentColor = '#FFB7D9';
let showHistory = false;
let historyFilter = 'all';
let partyMode = false;
let partyFrame = null;
let toastTimer = null;

// ── NOTIFICATIONS ──
const NOTIF_KEY = `bot_seen_notifs_${GIRL}`;
const NOTIF_EXPIRY_DAYS = 14;

function getSeenNotifs() {
  try { return JSON.parse(localStorage.getItem(NOTIF_KEY) || '{}'); }
  catch { return {}; }
}

function markNotifSeen(id) {
  const seen = getSeenNotifs();
  seen[id] = Date.now();
  // prune entries older than expiry window
  const cutoff = Date.now() - NOTIF_EXPIRY_DAYS * 24 * 60 * 60 * 1000;
  for (const k in seen) { if (seen[k] < cutoff) delete seen[k]; }
  localStorage.setItem(NOTIF_KEY, JSON.stringify(seen));
}

function buildNotifications() {
  const stack = document.getElementById('notif-stack');
  stack.innerHTML = '';

  const seen = getSeenNotifs();
  const cutoff = new Date(Date.now() - NOTIF_EXPIRY_DAYS * 24 * 60 * 60 * 1000);

  // Find unseen allowance + bonus transactions within expiry window
  const pending = txData.filter(t => {
    if (t.type !== 'allowance' && t.type !== 'bonus') return false;
    if (seen[t.id]) return false;
    if (new Date(t.created_at) < cutoff) return false;
    return true;
  });

  if (!pending.length) return;

  // Stack them — oldest first so newest is visually on top
  const ordered = [...pending].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

  ordered.forEach((t, i) => {
    const isBonus = t.type === 'bonus';
    const emoji = isBonus ? '🤑' : '💪';
    const title = isBonus ? 'Bonus earned!' : 'Weekly allowance added!';
    const sub = new Date(t.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const noteText = t.note ? ` · ${t.note}` : '';

    const card = document.createElement('div');
    card.className = `notif-card ${t.type}`;
    card.style.animationDelay = `${i * 80}ms`;
    card.innerHTML = `
      <div class="notif-emoji">${emoji}</div>
      <div class="notif-body">
        <div class="notif-title">${title}</div>
        <div class="notif-sub">${sub}${noteText}</div>
      </div>
      <div class="notif-amount">+${fmt(safeAmt(t))}</div>
      <button class="notif-dismiss" onclick="dismissNotif('${t.id}', this.closest('.notif-card'))">✕</button>
    `;
    stack.appendChild(card);
  });
}

function dismissNotif(id, cardEl) {
  markNotifSeen(id);
  cardEl.style.transition = 'opacity 0.25s, transform 0.25s';
  cardEl.style.opacity = '0';
  cardEl.style.transform = 'translateY(10px) scale(0.95)';
  setTimeout(() => cardEl.remove(), 260);
}

function hideSplash() {
  const splash = document.getElementById('splash-screen');
  if (!splash) return;
  splash.classList.add('fade-out');
  setTimeout(() => splash.remove(), 420);
}

async function init() {
  try {
    await loadSettings();
    await loadTransactions();
    render();
    buildNotifications();
  } catch (err) {
    console.error(err);
    showToast('Something went wrong loading data');
  } finally {
    hideSplash();
  }
}

async function loadSettings() {
  try {
    const saved = localStorage.getItem(`tinsleyColor_${GIRL}`);
    if (saved) { accentColor = saved; applyColor(saved); document.getElementById('color-picker').value = saved; }
  } catch(e) { /* ignore */ }
}

async function loadTransactions() {
  const data = await apiGet('getTransactions', { girl: GIRL });
  if (data) txData = [...data].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
}

function safeAmt(t) {
  return parseFloat(t.amount) || 0;
}

function calcBalance() {
  return txData.reduce((s, t) => t.type === 'spend' ? s - safeAmt(t) : s + safeAmt(t), 0);
}

function fmt(n) {
  const sign = n < 0 ? '-' : '';
  return `${sign}$${Math.abs(n).toFixed(2)}`;
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function render() {
  document.getElementById('balance-display').textContent = fmt(calcBalance());
  renderTransactions();
  renderStats();
  renderChart();
}

function renderTransactions() {
  const list = document.getElementById('tx-list');
  const txs = showHistory
    ? (historyFilter === 'all' ? txData : txData.filter(t => t.type === historyFilter))
    : txData.slice(0, 8);

  document.getElementById('list-label').textContent = showHistory ? 'Full History' : 'Recent Transactions';
  document.getElementById('history-btn').textContent = showHistory ? 'Show Recent' : 'Full History';
  document.getElementById('filter-bar').style.display = showHistory ? 'flex' : 'none';

  if (!txs.length) {
    list.innerHTML = '<div class="empty-state">No transactions yet.</div>';
    return;
  }

  list.innerHTML = txs.map(t => {
    const isSpend = t.type === 'spend';
    const catTag = t.category ? `<span class="tx-cat-tag">${t.category}</span>` : '';
    const noteHtml = t.note ? `<span class="tx-note"> · ${t.note}</span>` : '';
    return `<div class="tx-item">
      <div class="tx-row1">
        <span class="tx-type ${t.type}">${t.type}</span>
        ${catTag}
        <span class="tx-amount ${isSpend ? 'spend' : 'earn'}">${isSpend ? '-' : '+'}${fmt(safeAmt(t))}</span>
      </div>
      <div class="tx-row2">
        <span class="tx-date">${fmtDate(t.created_at)}</span>
        ${noteHtml}
      </div>
    </div>`;
  }).join('');
}

function renderStats() {
  const now = new Date();
  const month = now.getMonth(), year = now.getFullYear();
  const monthName = now.toLocaleString('en-US', { month: 'long' });
  document.getElementById('stats-month').textContent = monthName;

  const thisMo = txData.filter(t => {
    const d = new Date(t.created_at);
    return d.getMonth() === month && d.getFullYear() === year;
  });

  let earned = 0, spent = 0, bonus = 0;
  thisMo.forEach(t => {
    const a = safeAmt(t);
    if (t.type === 'spend') spent += a;
    else if (t.type === 'bonus') bonus += a;
    else earned += a;
  });

  document.getElementById('stat-earned').textContent = fmt(earned);
  document.getElementById('stat-spent').textContent = fmt(spent);
  document.getElementById('stat-bonus').textContent = fmt(bonus);
}

function toggleHistory() {
  showHistory = !showHistory;
  if (!showHistory) {
    historyFilter = 'all';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === 'all'));
  }
  renderTransactions();
}

function setFilter(f) {
  historyFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  renderTransactions();
}

function openSettings() {
  document.getElementById('settings-panel').classList.add('open');
  document.getElementById('settings-overlay').classList.add('show');
}
function closeSettings() {
  document.getElementById('settings-panel').classList.remove('open');
  document.getElementById('settings-overlay').classList.remove('show');
}

function applyColor(color) {
  accentColor = color;
  document.documentElement.style.setProperty('--accent', color);
  document.getElementById('color-swatch').style.background = color;
  document.getElementById('color-label').style.color = color;
  document.getElementById('color-picker').value = color;
}

function swatchPreview(color) {
  document.getElementById('color-swatch').style.background = color;
}

async function saveColor() {
  const color = document.getElementById('color-picker').value;
  localStorage.setItem(`tinsleyColor_${GIRL}`, color);
  applyColor(color);
  showToast('Color saved! 🎨');
}

async function resetColor() {
  localStorage.removeItem(`tinsleyColor_${GIRL}`);
  applyColor(DEFAULT_COLOR);
  document.getElementById('color-picker').value = DEFAULT_COLOR;
  showToast('Color reset!');
}

function toggleParty() {
  partyMode = !partyMode;
  const confetti = document.getElementById('confetti');
  const disco = document.getElementById('disco-ball');
  const cats = document.getElementById('party-cats');

  if (partyMode) {
    // Confetti
    confetti.classList.add('show');
    // Disco ball — drop then sway
    disco.style.display = 'block';
    disco.classList.remove('sway');
    disco.classList.add('drop');
    disco.addEventListener('animationend', function handler(e) {
      if (e.animationName === 'ballDrop') {
        disco.classList.remove('drop');
        disco.style.top = '-10px';
        disco.classList.add('sway');
        disco.removeEventListener('animationend', handler);
      }
    });
    // Party cats slide up
    cats.style.display = 'flex';
    requestAnimationFrame(() => cats.classList.add('show'));
    // Color cycle
    let frame = 0;
    const props = [
      ['--bg', 10, 50], ['--surface', 15, 50], ['--surface2', 18, 50],
      ['--surface3', 22, 50], ['--text', 85, 80], ['--border', 35, 40]
    ];
    const offsets = props.map((_, i) => i * 25);
    let lastTime = null;
    function partyLoop(ts) {
      if (!partyMode) return;
      if (!lastTime || ts - lastTime >= 50) {
        lastTime = ts;
        frame += 3;
        props.forEach(([prop, l, s], i) => {
          const h = (frame + offsets[i]) % 360;
          document.documentElement.style.setProperty(prop, `hsl(${h},${s}%,${l}%)`);
        });
        document.documentElement.style.setProperty('--accent', `hsl(${(frame * 2) % 360},90%,75%)`);
      }
      partyFrame = requestAnimationFrame(partyLoop);
    }
    partyFrame = requestAnimationFrame(partyLoop);

  } else {
    confetti.classList.remove('show');
    disco.classList.remove('drop', 'sway');
    disco.style.display = 'none';
    disco.style.top = '-180px';
    cats.classList.remove('show');
    setTimeout(() => { cats.style.display = 'none'; }, 1000);
    cancelAnimationFrame(partyFrame);
    const r = document.documentElement.style;
    [['--bg','#0f0f13'],['--surface','#1a1a22'],['--surface2','#22222e'],
     ['--surface3','#2a2a38'],['--text','#f0f0f5'],['--border','#33334a']
    ].forEach(([k, v]) => r.setProperty(k, v));
    r.setProperty('--accent', accentColor);
  }
}

async function exportCSV() {
  const data = await apiGet('getTransactions', { girl: GIRL });
  const sorted = [...(data || [])].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  if (!sorted.length) { alert('No data to export.'); return; }
  const rows = [['date','type','amount','category','note'],
    ...sorted.map(t => [
      new Date(t.created_at).toLocaleDateString('en-US'),
      t.type, t.amount, t.category||'', t.note||''
    ])
  ];
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([csv], {type:'text/csv'})),
    download: `tinsley-${GIRL.toLowerCase()}.csv`
  }).click();
  showToast('CSV downloaded! 📊');
}

function showToast(msg) {
  clearTimeout(toastTimer);
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
// ── CHART ──
let chartInstance = null;
let chartRange = 'month';

function setChartRange(range) {
  chartRange = range;
  document.querySelectorAll('.chart-tab').forEach(b =>
    b.classList.toggle('active', b.dataset.range === range)
  );
  renderChart();
}

function renderChart() {
  const now = new Date();
  let labels = [];
  let balances = [];

  // Build sorted list oldest→newest with pre-parsed amounts
  const sorted = [...txData]
    .sort((a, b) => new Date(a.created_at) - new Date(b.created_at))
    .map(t => ({ ...t, _amt: safeAmt(t), _ts: new Date(t.created_at).getTime() }));

  // Build running balance: walk sorted once, emit balance at each cutoff timestamp
  function runningBalances(cutoffs) {
    let bal = 0, idx = 0;
    return cutoffs.map(cutoffMs => {
      while (idx < sorted.length && sorted[idx]._ts <= cutoffMs) {
        const t = sorted[idx++];
        bal += t.type === 'spend' ? -t._amt : t._amt;
      }
      return bal;
    });
  }

  if (chartRange === 'week') {
    const cutoffs = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(now);
      d.setDate(d.getDate() - i);
      d.setHours(23, 59, 59, 999);
      labels.push(d.toLocaleDateString('en-US', { weekday: 'short' }));
      cutoffs.push(d.getTime());
    }
    balances = runningBalances(cutoffs);

  } else if (chartRange === 'month') {
    const cutoffs = [];
    const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
    for (let i = 1; i <= daysInMonth; i++) {
      const d = new Date(now.getFullYear(), now.getMonth(), i, 23, 59, 59, 999);
      if (d > now) break;
      labels.push(i.toString());
      cutoffs.push(d.getTime());
    }
    balances = runningBalances(cutoffs);

  } else if (chartRange === 'year') {
    const cutoffs = [];
    for (let i = 11; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i + 1, 0, 23, 59, 59, 999);
      labels.push(d.toLocaleDateString('en-US', { month: 'short' }));
      cutoffs.push(d.getTime());
    }
    balances = runningBalances(cutoffs);

  } else {
    if (!sorted.length) {
      labels = []; balances = [];
    } else {
      const first = new Date(sorted[0]._ts);
      const cursor = new Date(first.getFullYear(), first.getMonth(), 1);
      const cutoffs = [];
      while (cursor <= now) {
        const end = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 0, 23, 59, 59, 999);
        labels.push(cursor.toLocaleDateString('en-US', { month: 'short', year: '2-digit' }));
        cutoffs.push(end.getTime());
        cursor.setMonth(cursor.getMonth() + 1);
      }
      balances = runningBalances(cutoffs);
    }
  }

  const accent = getComputedStyle(document.documentElement)
    .getPropertyValue('--accent').trim() || accentColor;

  const ctx = document.getElementById('balance-chart').getContext('2d');

  if (chartInstance) chartInstance.destroy();

  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: balances,
        borderColor: accent,
        backgroundColor: `color-mix(in srgb, ${accent} 15%, transparent)`,
        borderWidth: 2.5,
        pointRadius: labels.length > 20 ? 0 : 3,
        pointHoverRadius: 5,
        pointBackgroundColor: accent,
        fill: true,
        tension: 0.4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => `$${ctx.parsed.y.toFixed(2)}`
          },
          backgroundColor: '#22222e',
          borderColor: '#33334a',
          borderWidth: 1,
          titleColor: '#f0f0f5',
          bodyColor: accent,
          padding: 10,
          cornerRadius: 8
        }
      },
      scales: {
        x: {
          grid: { color: '#33334a', drawBorder: false },
          ticks: { color: '#8888a0', font: { size: 11 }, maxTicksLimit: 8 }
        },
        y: {
          grid: { color: '#33334a', drawBorder: false },
          ticks: {
            color: '#8888a0', font: { size: 11 },
            callback: v => `$${v}`
          }
        }
      }
    }
  });
}

// ── PULL TO REFRESH ──
(function() {
  const PTR_THRESHOLD = 80;
  let startY = 0, currentY = 0, pulling = false, refreshing = false;
  const indicator = document.getElementById('ptr-indicator');

  document.addEventListener('touchstart', e => {
    if (window.scrollY > 0 || refreshing) return;
    startY = e.touches[0].clientY;
    pulling = true;
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!pulling || refreshing) return;
    currentY = e.touches[0].clientY;
    const delta = Math.min(currentY - startY, PTR_THRESHOLD * 1.5);
    if (delta <= 0) return;

    indicator.classList.add('ptr-visible');
    if (delta >= PTR_THRESHOLD) {
      indicator.classList.add('ptr-ready');
      indicator.querySelector('span').textContent = '↻';
    } else {
      indicator.classList.remove('ptr-ready');
      indicator.querySelector('span').textContent = '↓';
      indicator.style.transform = `translateX(-50%) translateY(${-60 + delta * 0.75}px)`;
    }
  }, { passive: true });

  document.addEventListener('touchend', async () => {
    if (!pulling || refreshing) return;
    pulling = false;
    const delta = currentY - startY;

    if (delta >= PTR_THRESHOLD) {
      refreshing = true;
      const grid = document.querySelector('.main-grid');
      indicator.classList.add('ptr-ready', 'ptr-spinning');
      indicator.style.transform = 'translateX(-50%) translateY(16px)';
      indicator.querySelector('span').textContent = '↻';
      if (grid) { grid.style.transition = 'opacity 0.2s'; grid.style.opacity = '0.4'; }
      await loadTransactions();
      render();
      buildNotifications();
      if (grid) { grid.style.opacity = '1'; }
      refreshing = false;
    }

    indicator.classList.remove('ptr-visible', 'ptr-ready', 'ptr-spinning');
    indicator.style.transform = '';
    indicator.querySelector('span').textContent = '↓';
    currentY = 0; startY = 0;
  });
})();

init();
</script>
</body>
</html>
